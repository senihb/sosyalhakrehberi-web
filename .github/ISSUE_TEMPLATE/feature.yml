name: "💡 Feature request"
description: "Suggest a new feature or improvement"
title: "[FEATURE] "
labels: ["enhancement", "feature"]

body:
  - type: textarea
    id: feature
    attributes:
      label: "Feature Request"
      description: "Describe the feature you would like to see"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: "Problem"
      description: "What problem does this solve?"

  - type: textarea
    id: solution
    attributes:
      label: "Proposed Solution"
      description: "Describe your suggested solution"

  - type: checkboxes
    id: impact
    attributes:
      label: "User Impact"
      options:
        - label: "Individuals"
        - label: "Institutions"
        - label: "NGOs"
        - label: "Other"

  - type: textarea
    id: outcome
    attributes:
      label: "Expected Outcome"
      description: "What improvement would this bring?"

