name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --include=dev

      - name: Check UTF-8 encoding
        run: node scripts/check-utf8.mjs

      - name: Run lint
        run: npm run lint

      - name: Run build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.example.com
        run: npm run build
